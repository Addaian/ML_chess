<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML_chess Engine</title>
<style>
/* ===== Reset & Variables ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --sq: 68px;
  --board: calc(var(--sq) * 8);
  --bg: #0f0f1a;
  --bg2: #161625;
  --card: #1a1e2e;
  --card-border: #252a3a;
  --accent: #7c83ff;
  --accent-hover: #6a70e6;
  --accent-glow: rgba(124,131,255,.25);
  --text: #e8e8f0;
  --text2: #a0a0b8;
  --text3: #6a6a80;
  --light-sq: #ebd5b3;
  --dark-sq: #a67c52;
  --select-light: #7cadea;
  --select-dark: #5a8cc8;
  --last-light: #f6f592;
  --last-dark: #bbca3a;
  --check-glow: rgba(255,25,25,.75);
  --dot-color: rgba(0,0,0,.22);
  --radius: 10px;
  --radius-sm: 6px;
}
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ===== Toolbar ===== */
.toolbar {
  width: 100%; max-width: 920px;
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px;
}
.brand {
  font-size: 1.2rem; font-weight: 700; letter-spacing: .3px;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.brand svg { width: 22px; height: 22px; }
.brand-accent { color: var(--accent); }
.toolbar-gap { flex: 1; }
.tb-btn {
  background: var(--card); color: var(--text2); border: 1px solid var(--card-border);
  padding: 7px 14px; border-radius: var(--radius-sm); font-size: .82rem;
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: background .15s, color .15s, border-color .15s;
  font-family: inherit; white-space: nowrap;
}
.tb-btn:hover { background: #252a3f; color: var(--text); border-color: #3a3f55; }
.tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.tb-btn.primary:hover { background: var(--accent-hover); }
.tb-btn.active { color: var(--accent); border-color: var(--accent); }
.tb-btn svg { width: 15px; height: 15px; fill: currentColor; }
.tb-btn:disabled { opacity: .4; cursor: default; }

/* ===== Game Layout ===== */
.game {
  display: flex; gap: 18px; align-items: flex-start;
  max-width: 920px; width: 100%; padding: 0 20px 30px;
}

/* ===== Eval Bar ===== */
.eval-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; padding-top: 40px; }
.eval-bar {
  width: 30px; height: var(--board); border-radius: 4px;
  background: #2a2a2a; position: relative; overflow: hidden;
  border: 1px solid #3a3a3a;
  box-shadow: inset 0 0 8px rgba(0,0,0,.4);
}
.eval-fill {
  position: absolute; bottom: 0; left: 0; width: 100%;
  background: linear-gradient(to top, #f5f5f0, #e0ddd5);
  transition: height .5s cubic-bezier(.4,0,.2,1);
}
.eval-label {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-size: .65rem; font-weight: 700; z-index: 2;
  transition: bottom .5s cubic-bezier(.4,0,.2,1);
  white-space: nowrap; pointer-events: none;
  text-shadow: 0 0 4px rgba(0,0,0,.5);
}

/* ===== Board Column ===== */
.board-col { flex-shrink: 0; display: flex; flex-direction: column; gap: 0; }

/* ===== Player Bars ===== */
.player-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 6px; height: 38px; min-height: 38px;
}
.player-icon {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; flex-shrink: 0;
}
.player-icon.white-icon { background: #e8e8e8; color: #222; }
.player-icon.black-icon { background: #333; color: #ddd; border: 1px solid #555; }
.player-name { font-size: .85rem; font-weight: 600; white-space: nowrap; }
.captured-pieces {
  display: flex; align-items: center; gap: 0; flex: 1;
  font-size: .95rem; line-height: 1; overflow: hidden;
}
.captured-pieces .cap { opacity: .85; margin-right: -2px; }
.material-adv {
  font-size: .75rem; font-weight: 700; color: var(--text2);
  background: rgba(255,255,255,.08); padding: 2px 7px; border-radius: 4px;
  white-space: nowrap;
}

/* ===== Board ===== */
.board-wrap { position: relative; border-radius: 3px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.5); }
.board {
  display: grid;
  grid-template-columns: repeat(8, var(--sq));
  grid-template-rows: repeat(8, var(--sq));
  user-select: none;
}
.sq {
  width: var(--sq); height: var(--sq);
  display: flex; align-items: center; justify-content: center;
  position: relative; cursor: pointer;
  transition: background .12s;
}
.sq.light { background: var(--light-sq); }
.sq.dark { background: var(--dark-sq); }
.sq.selected.light { background: var(--select-light); }
.sq.selected.dark { background: var(--select-dark); }
.sq.last.light { background: var(--last-light); }
.sq.last.dark { background: var(--last-dark); }
.sq.check { box-shadow: inset 0 0 14px 5px var(--check-glow); z-index: 1; }
.sq:hover::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,.06); pointer-events: none;
}

/* ===== Pieces ===== */
.pc {
  font-size: calc(var(--sq) * 0.82); line-height: 1;
  pointer-events: none; position: relative; z-index: 2;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,.35));
  transition: transform .05s;
}
.pc.w {
  color: #fff;
  -webkit-text-stroke: .8px #555;
  paint-order: stroke fill;
}
.pc.b {
  color: #1a1a1a;
  -webkit-text-stroke: .3px #000;
}
.sq.dragging .pc { opacity: .3; }

/* ===== Legal Move Indicators ===== */
.dot {
  position: absolute; z-index: 3; pointer-events: none;
  width: calc(var(--sq) * .28); height: calc(var(--sq) * .28);
  border-radius: 50%; background: var(--dot-color);
}
.dot.cap {
  width: calc(var(--sq) * .82); height: calc(var(--sq) * .82);
  background: transparent; border: calc(var(--sq) * .08) solid var(--dot-color);
  border-radius: 50%;
}

/* ===== Coordinates ===== */
.coord {
  position: absolute; font-size: .65rem; font-weight: 700;
  pointer-events: none; z-index: 3; line-height: 1;
}
.coord-rank { top: 3px; left: 4px; }
.coord-file { bottom: 2px; right: 4px; }
.sq.light .coord { color: var(--dark-sq); }
.sq.dark .coord { color: var(--light-sq); }

/* ===== Side Panel ===== */
.panel-col {
  flex: 1; min-width: 210px; max-width: 280px;
  display: flex; flex-direction: column; gap: 12px;
  padding-top: 40px;
}
.card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.card-title {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text3); margin-bottom: 10px;
}

/* Status */
#status-text { font-size: 1.05rem; font-weight: 600; line-height: 1.3; }
.status-detail { font-size: .78rem; color: var(--text2); margin-top: 4px; }

/* Settings */
.setting-row { display: flex; align-items: center; justify-content: space-between; }
.setting-label { font-size: .82rem; color: var(--text2); }
.depth-select {
  background: var(--bg); color: var(--text); border: 1px solid var(--card-border);
  padding: 5px 10px; border-radius: var(--radius-sm); font-size: .85rem;
  font-family: inherit; cursor: pointer;
}
.depth-select:focus { outline: none; border-color: var(--accent); }

/* Move History */
.history-card { flex: 1; max-height: 260px; display: flex; flex-direction: column; }
.history-card .card-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
.move-table { width: 100%; font-size: .82rem; font-family: "SF Mono", "Cascadia Code", "Consolas", monospace; }
.move-row {
  display: flex; align-items: center; padding: 3px 4px; border-radius: 3px;
  transition: background .1s;
}
.move-row:hover { background: rgba(255,255,255,.04); }
.move-num { color: var(--text3); min-width: 28px; text-align: right; margin-right: 10px; font-size: .75rem; }
.move-w, .move-b { flex: 1; padding: 2px 4px; border-radius: 3px; cursor: default; }
.move-w:hover, .move-b:hover { background: rgba(255,255,255,.06); }

/* FEN */
.fen-text {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: .68rem; color: var(--text3); word-break: break-all;
  line-height: 1.5; cursor: pointer; padding: 6px 8px;
  background: rgba(0,0,0,.2); border-radius: 4px;
  transition: color .15s;
}
.fen-text:hover { color: var(--text2); }
.fen-copied { color: var(--accent) !important; }

/* ===== Overlays ===== */
.overlay {
  position: absolute; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px;
}
.overlay.hidden { display: none; }

/* Thinking */
.think-overlay { background: rgba(0,0,0,.35); z-index: 20; }
.think-box {
  background: var(--card); border: 1px solid var(--card-border);
  padding: 16px 28px; border-radius: var(--radius);
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.spinner {
  width: 22px; height: 22px;
  border: 3px solid rgba(255,255,255,.15); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.think-text { font-size: .88rem; color: var(--text2); }

/* Promotion */
.promo-overlay { background: rgba(0,0,0,.5); z-index: 25; }
.promo-dialog {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 14px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
}
.promo-title { font-size: .78rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.promo-pieces { display: flex; gap: 8px; }
.promo-btn {
  width: 72px; height: 72px; font-size: 50px;
  background: var(--bg); border: 2px solid var(--card-border);
  border-radius: var(--radius); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, background .15s, transform .1s;
  line-height: 1;
}
.promo-btn:hover { border-color: var(--accent); background: #222; transform: scale(1.05); }

/* Game Over */
.gameover-overlay { background: rgba(0,0,0,.55); z-index: 22; }
.gameover-box {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 14px; padding: 32px 44px; text-align: center;
  box-shadow: 0 12px 48px rgba(0,0,0,.6);
  animation: popIn .3s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.gameover-icon { font-size: 48px; margin-bottom: 8px; }
.gameover-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
.gameover-detail { color: var(--text2); font-size: .9rem; margin-bottom: 20px; }
.gameover-btn {
  background: var(--accent); color: #fff; border: none;
  padding: 10px 28px; border-radius: var(--radius-sm);
  font-size: .9rem; font-weight: 600; cursor: pointer;
  transition: background .15s; font-family: inherit;
}
.gameover-btn:hover { background: var(--accent-hover); }

/* ===== Toast ===== */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--card); border: 1px solid var(--card-border);
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: .85rem; box-shadow: 0 4px 20px rgba(0,0,0,.5);
  animation: slideIn .25s ease-out;
  max-width: 320px;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }
.toast.error { border-left: 3px solid #e55; }
.toast.info { border-left: 3px solid var(--accent); }

/* ===== Drag Ghost ===== */
.drag-ghost {
  position: fixed; z-index: 1000; pointer-events: none;
  font-size: calc(var(--sq) * 0.92); line-height: 1;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,.5));
  transform: translate(-50%, -50%);
  will-change: left, top;
}

/* ===== Scrollbar ===== */
.card-body::-webkit-scrollbar { width: 5px; }
.card-body::-webkit-scrollbar-track { background: transparent; }
.card-body::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

/* ===== Responsive ===== */
@media (max-width: 880px) {
  :root { --sq: 56px; }
  .game { flex-wrap: wrap; justify-content: center; }
  .panel-col { flex-basis: 100%; max-width: 100%; padding-top: 0; flex-direction: row; flex-wrap: wrap; gap: 10px; }
  .panel-col .card { flex: 1; min-width: 180px; }
  .history-card { max-height: 180px; }
  .eval-col { padding-top: 38px; }
}
@media (max-width: 560px) {
  :root { --sq: 44px; }
  .toolbar { padding: 10px 12px; gap: 6px; }
  .tb-btn { padding: 5px 8px; font-size: .75rem; }
  .brand { font-size: 1rem; }
  .game { padding: 0 8px 20px; gap: 8px; }
  .eval-col { display: none; }
}
</style>
</head>
<body>

<!-- ===== Toolbar ===== -->
<div class="toolbar">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9 7H6l-1 5h3l-2 8 9-10h-4l3-8z" fill="var(--accent)" stroke="var(--accent)"/></svg>
    <span><span class="brand-accent">ML_chess</span> Engine</span>
  </div>
  <div class="toolbar-gap"></div>
  <button class="tb-btn" id="btn-sound" title="Toggle sound (S)">
    <svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
    <span id="sound-label">Sound</span>
  </button>
  <button class="tb-btn" id="btn-undo" title="Undo (U)">
    <svg viewBox="0 0 24 24"><path d="M3 10h13a4 4 0 010 8H9M3 10l4-4M3 10l4 4"/></svg>
    Undo
  </button>
  <button class="tb-btn" id="btn-flip" title="Flip board (F)">
    <svg viewBox="0 0 24 24"><path d="M7 4v16M17 4v16M7 8l-4 4 4 4M17 8l4 4-4 4"/></svg>
    Flip
  </button>
  <button class="tb-btn primary" id="btn-new" title="New game (N)">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"/></svg>
    New Game
  </button>
</div>

<!-- ===== Game Area ===== -->
<div class="game">

  <!-- Eval Bar -->
  <div class="eval-col">
    <div class="eval-bar">
      <div class="eval-fill" id="eval-fill" style="height:50%"></div>
      <div class="eval-label" id="eval-label" style="bottom:50%">0.0</div>
    </div>
  </div>

  <!-- Board Column -->
  <div class="board-col">
    <div class="player-bar" id="player-top"></div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="overlay think-overlay hidden" id="thinking">
        <div class="think-box">
          <div class="spinner"></div>
          <span class="think-text" id="think-text">Engine thinking...</span>
        </div>
      </div>
      <div class="overlay promo-overlay hidden" id="promo-overlay"></div>
      <div class="overlay gameover-overlay hidden" id="gameover-overlay">
        <div class="gameover-box">
          <div class="gameover-icon" id="go-icon"></div>
          <div class="gameover-title" id="go-title"></div>
          <div class="gameover-detail" id="go-detail"></div>
          <button class="gameover-btn" onclick="newGame()">New Game</button>
        </div>
      </div>
    </div>
    <div class="player-bar" id="player-bottom"></div>
  </div>

  <!-- Side Panel -->
  <div class="panel-col">
    <div class="card">
      <div class="card-title">Game</div>
      <div id="status-text">White to move</div>
      <div class="status-detail" id="status-detail"></div>
    </div>

    <div class="card">
      <div class="card-title">Engine</div>
      <div class="setting-row">
        <span class="setting-label">Search depth</span>
        <select class="depth-select" id="depth-select">
          <option value="1">1 ply</option>
          <option value="2">2 ply</option>
          <option value="3" selected>3 ply</option>
          <option value="4">4 ply</option>
          <option value="5">5 ply</option>
        </select>
      </div>
    </div>

    <div class="card history-card">
      <div class="card-title">Moves</div>
      <div class="card-body">
        <div class="move-table" id="move-table"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Position</div>
      <div class="fen-text" id="fen-text" title="Click to copy FEN"></div>
    </div>
  </div>

</div>

<div class="toast-container" id="toast-container"></div>

<script>
/* ===== Constants ===== */
const UNICODE = {
  K:'\u2654',Q:'\u2655',R:'\u2656',B:'\u2657',N:'\u2658',P:'\u2659',
  k:'\u265A',q:'\u265B',r:'\u265C',b:'\u265D',n:'\u265E',p:'\u265F'
};
const VS = '\uFE0E'; // text variation selector
const FILES = 'abcdefgh';
const MAT_VAL = {P:1,N:3,B:3,R:5,Q:9,K:0};
const START_COUNT = {P:8,N:2,B:2,R:2,Q:1,K:1,p:8,n:2,b:2,r:2,q:1,k:1};

/* ===== State ===== */
let state = null;
let moveHistory = [];
let selectedSq = null;
let pendingPromo = null;
let thinking = false;
let flipped = false;
let soundOn = true;

/* Drag state */
let dragActive = false;
let dragGhost = null;
let dragOriginSq = null;
let dragStartX = 0;
let dragStartY = 0;

/* ===== Audio ===== */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
  if (!soundOn) return;
  try { ensureAudio(); } catch(e) { return; }
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  switch(type) {
    case 'move':
      osc.type='sine'; osc.frequency.setValueAtTime(440,t);
      g.gain.setValueAtTime(.08,t); g.gain.exponentialRampToValueAtTime(.001,t+.07);
      osc.start(t); osc.stop(t+.07); break;
    case 'capture':
      osc.type='triangle'; osc.frequency.setValueAtTime(260,t);
      osc.frequency.exponentialRampToValueAtTime(120,t+.12);
      g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.12);
      osc.start(t); osc.stop(t+.12); break;
    case 'check':
      osc.type='square'; osc.frequency.setValueAtTime(580,t);
      osc.frequency.setValueAtTime(640,t+.06);
      g.gain.setValueAtTime(.05,t); g.gain.exponentialRampToValueAtTime(.001,t+.15);
      osc.start(t); osc.stop(t+.15); break;
    case 'gameover':
      osc.type='sine'; osc.frequency.setValueAtTime(523,t);
      osc.frequency.setValueAtTime(392,t+.15); osc.frequency.setValueAtTime(330,t+.3);
      g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.5);
      osc.start(t); osc.stop(t+.5); break;
    case 'illegal':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(150,t);
      g.gain.setValueAtTime(.06,t); g.gain.exponentialRampToValueAtTime(.001,t+.08);
      osc.start(t); osc.stop(t+.08); break;
  }
}

/* ===== Coord Helpers ===== */
function sqFile(sq) { return sq & 7; }
function sqRank(sq) { return sq >> 3; }
function sqName(sq) { return FILES[sqFile(sq)] + (sqRank(sq) + 1); }
function nameToSq(n) { return (FILES.indexOf(n[0])) + (parseInt(n[1]) - 1) * 8; }
function vis(vr, vc) {
  return flipped ? (vr * 8 + (7 - vc)) : ((7 - vr) * 8 + vc);
}
function sqSize() { return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sq')); }

/* ===== API ===== */
async function apiGet(u) { return (await fetch(u)).json(); }
async function apiPost(u, b) {
  return (await fetch(u, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)})).json();
}

/* ===== Material / Captures ===== */
function getCaptured() {
  if (!state) return {byWhite:[], byBlack:[]};
  const cur = {};
  for (const p of state.pieces) if (p) cur[p] = (cur[p]||0) + 1;
  const byWhite = [], byBlack = [];
  for (const [piece, cnt] of Object.entries(START_COUNT)) {
    const diff = cnt - (cur[piece]||0);
    const isW = piece === piece.toUpperCase();
    for (let i = 0; i < diff; i++) { if (isW) byBlack.push(piece); else byWhite.push(piece); }
  }
  const v = p => MAT_VAL[p.toUpperCase()]||0;
  byWhite.sort((a,b) => v(b)-v(a));
  byBlack.sort((a,b) => v(b)-v(a));
  return {byWhite, byBlack};
}
function matAdv() {
  const c = getCaptured();
  const v = p => MAT_VAL[p.toUpperCase()]||0;
  let adv = 0;
  c.byWhite.forEach(p => adv += v(p));
  c.byBlack.forEach(p => adv -= v(p));
  return adv; // positive = white ahead
}

/* ===== Toast ===== */
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

/* ===== Rendering ===== */
function pieceHTML(ch) {
  if (!ch) return '';
  const cls = ch === ch.toUpperCase() ? 'pc w' : 'pc b';
  return '<span class="'+cls+'">'+UNICODE[ch]+VS+'</span>';
}

function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  const last = getLastSqs();
  for (let vr = 0; vr < 8; vr++) {
    for (let vc = 0; vc < 8; vc++) {
      const sq = vis(vr, vc);
      const isLight = (sqRank(sq) + sqFile(sq)) % 2 === 0;
      const d = document.createElement('div');
      d.className = 'sq ' + (isLight ? 'light' : 'dark');
      d.dataset.sq = sq;

      // Last move
      if (last && (sq === last.from || sq === last.to)) d.classList.add('last');
      // Selection
      if (sq === selectedSq) d.classList.add('selected');
      // Check
      if (state && state.in_check) {
        const p = state.pieces[sq];
        if (p && ((state.side==='w' && p==='K') || (state.side==='b' && p==='k'))) d.classList.add('check');
      }
      // Dragging source
      if (dragActive && sq === dragOriginSq) d.classList.add('dragging');

      // Piece
      if (state && state.pieces[sq]) d.innerHTML = pieceHTML(state.pieces[sq]);

      // Legal dots
      if (selectedSq !== null && state) {
        const from = sqName(selectedSq);
        const targets = state.legal_moves[from] || [];
        const sn = sqName(sq);
        if (targets.some(u => u.substring(2,4) === sn)) {
          const dot = document.createElement('div');
          dot.className = 'dot' + (state.pieces[sq] ? ' cap' : '');
          d.appendChild(dot);
        }
      }

      // Coords
      const fileIdx = flipped ? (7 - vc) : vc;
      const rankIdx = flipped ? vr : (7 - vr);
      if (vc === 0) {
        const c = document.createElement('span');
        c.className = 'coord coord-rank';
        c.textContent = rankIdx + 1;
        d.appendChild(c);
      }
      if (vr === 7) {
        const c = document.createElement('span');
        c.className = 'coord coord-file';
        c.textContent = FILES[fileIdx];
        d.appendChild(c);
      }

      d.addEventListener('mousedown', e => onSqMouseDown(e, sq));
      d.addEventListener('touchstart', e => onSqTouchStart(e, sq), {passive:false});
      el.appendChild(d);
    }
  }
}

function getLastSqs() {
  if (!moveHistory.length) return null;
  const m = moveHistory[moveHistory.length - 1];
  const uci = m.uci || m;
  return { from: nameToSq(uci.slice(0,2)), to: nameToSq(uci.slice(2,4)) };
}

function renderEval() {
  if (!state) return;
  const cp = state.eval;
  const pawns = cp / 100;
  const clamped = Math.max(-10, Math.min(10, pawns));
  const pct = ((clamped + 10) / 20) * 100;
  const fill = document.getElementById('eval-fill');
  const label = document.getElementById('eval-label');
  fill.style.height = pct + '%';
  label.style.bottom = Math.max(2, Math.min(96, pct)) + '%';
  const abs = Math.abs(pawns);
  const txt = (pawns >= 0 ? '+' : '-') + (abs >= 100 ? 'M' + Math.ceil((1000000 - Math.abs(cp)) / 200) : abs.toFixed(1));
  label.textContent = txt;
  label.style.color = pct > 55 ? '#333' : '#eee';
}

function renderStatus() {
  if (!state) return;
  const el = document.getElementById('status-text');
  const det = document.getElementById('status-detail');
  const side = state.side === 'w' ? 'White' : 'Black';
  if (state.status === 'checkmate') {
    const winner = state.side === 'w' ? 'Black' : 'White';
    el.textContent = 'Checkmate';
    det.textContent = winner + ' wins the game';
  } else if (state.status === 'stalemate') {
    el.textContent = 'Stalemate';
    det.textContent = 'Game drawn';
  } else if (state.status === 'check') {
    el.textContent = side + ' to move';
    det.textContent = 'Check!';
    det.style.color = '#e55';
  } else {
    el.textContent = side + ' to move';
    det.textContent = 'Move ' + state.fullmove;
    det.style.color = '';
  }
}

function renderHistory() {
  const el = document.getElementById('move-table');
  el.innerHTML = '';
  for (let i = 0; i < moveHistory.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    const w = moveHistory[i];
    const b = moveHistory[i+1];
    const row = document.createElement('div');
    row.className = 'move-row';
    row.innerHTML =
      '<span class="move-num">' + num + '.</span>' +
      '<span class="move-w">' + (w.san || w) + '</span>' +
      '<span class="move-b">' + (b ? (b.san || b) : '') + '</span>';
    el.appendChild(row);
  }
  // Scroll to bottom
  const body = el.parentElement;
  if (body) body.scrollTop = body.scrollHeight;
}

function renderFen() {
  if (!state) return;
  document.getElementById('fen-text').textContent = state.fen;
}

function renderPlayerBars() {
  const cap = getCaptured();
  const adv = matAdv();
  const topIsEngine = !flipped;

  renderPlayerBar(
    document.getElementById('player-top'),
    topIsEngine ? 'Engine' : 'You',
    topIsEngine ? 'black-icon' : 'white-icon',
    topIsEngine ? cap.byBlack : cap.byWhite,
    topIsEngine ? (adv < 0 ? -adv : 0) : (adv > 0 ? adv : 0)
  );
  renderPlayerBar(
    document.getElementById('player-bottom'),
    topIsEngine ? 'You' : 'Engine',
    topIsEngine ? 'white-icon' : 'black-icon',
    topIsEngine ? cap.byWhite : cap.byBlack,
    topIsEngine ? (adv > 0 ? adv : 0) : (adv < 0 ? -adv : 0)
  );
}

function renderPlayerBar(el, name, iconCls, captured, advantage) {
  let h = '<div class="player-icon '+iconCls+'">' + name[0] + '</div>';
  h += '<span class="player-name">' + name + '</span>';
  h += '<span class="captured-pieces">';
  captured.forEach(p => { h += '<span class="cap">' + UNICODE[p] + VS + '</span>'; });
  h += '</span>';
  if (advantage > 0) h += '<span class="material-adv">+' + advantage + '</span>';
  el.innerHTML = h;
}

function renderGameOver() {
  const ol = document.getElementById('gameover-overlay');
  if (!state || (state.status !== 'checkmate' && state.status !== 'stalemate')) {
    ol.classList.add('hidden');
    return;
  }
  ol.classList.remove('hidden');
  const icon = document.getElementById('go-icon');
  const title = document.getElementById('go-title');
  const detail = document.getElementById('go-detail');
  if (state.status === 'checkmate') {
    const winner = state.side === 'w' ? 'Black' : 'White';
    const youWon = winner === 'White';
    icon.textContent = youWon ? '\u{1F3C6}' : '\u{1F614}';
    title.textContent = youWon ? 'You Win!' : 'Checkmate';
    detail.textContent = youWon ? 'Congratulations! You defeated the engine.' : 'The engine wins. Better luck next time!';
  } else {
    icon.textContent = '\u{1F91D}';
    title.textContent = 'Stalemate';
    detail.textContent = 'The game is a draw by stalemate.';
  }
}

function render() {
  renderBoard();
  renderEval();
  renderStatus();
  renderHistory();
  renderFen();
  renderPlayerBars();
  renderGameOver();
  document.getElementById('btn-undo').disabled = !moveHistory.length || thinking;
}

/* ===== Interaction ===== */
function onSqMouseDown(e, sq) {
  if (e.button !== 0) return; // left click only
  e.preventDefault();
  handlePointerDown(e.clientX, e.clientY, sq);
}
function onSqTouchStart(e, sq) {
  e.preventDefault();
  const t = e.touches[0];
  handlePointerDown(t.clientX, t.clientY, sq);
}

function handlePointerDown(x, y, sq) {
  if (thinking || !state || state.side !== 'w') return;
  if (state.status === 'checkmate' || state.status === 'stalemate') return;

  const piece = state.pieces[sq];
  const isOwn = piece && piece === piece.toUpperCase();

  // If piece selected, try to move to this square
  if (selectedSq !== null && sq !== selectedSq) {
    if (tryMove(sq)) return;
  }

  // Select / reselect own piece
  if (isOwn && sq !== selectedSq) {
    selectedSq = sq;
    startDrag(x, y, sq, piece);
    render();
  } else if (sq === selectedSq) {
    // Deselect
    selectedSq = null;
    render();
  } else {
    selectedSq = null;
    render();
  }
}

function tryMove(sq) {
  if (selectedSq === null) return false;
  const from = sqName(selectedSq);
  const to = sqName(sq);
  const targets = (state.legal_moves[from] || []).filter(u => u.substring(2,4) === to);
  if (!targets.length) return false;
  if (targets.length > 1) {
    pendingPromo = { from: selectedSq, to: sq, moves: targets };
    selectedSq = null;
    showPromotion();
    return true;
  }
  selectedSq = null;
  sendMove(targets[0]);
  return true;
}

/* ===== Drag & Drop ===== */
function startDrag(x, y, sq, piece) {
  dragActive = true;
  dragOriginSq = sq;
  dragStartX = x; dragStartY = y;
  dragGhost = document.createElement('div');
  dragGhost.className = 'drag-ghost';
  const cls = piece === piece.toUpperCase() ? 'pc w' : 'pc b';
  dragGhost.innerHTML = '<span class="'+cls+'">' + UNICODE[piece] + VS + '</span>';
  dragGhost.style.left = x + 'px';
  dragGhost.style.top = y + 'px';
  document.body.appendChild(dragGhost);
}

function onDocMouseMove(e) {
  if (!dragActive || !dragGhost) return;
  dragGhost.style.left = e.clientX + 'px';
  dragGhost.style.top = e.clientY + 'px';
}
function onDocTouchMove(e) {
  if (!dragActive || !dragGhost) return;
  e.preventDefault();
  const t = e.touches[0];
  dragGhost.style.left = t.clientX + 'px';
  dragGhost.style.top = t.clientY + 'px';
}
function onDocMouseUp(e) { endDrag(e.clientX, e.clientY); }
function onDocTouchEnd(e) {
  if (!dragActive) return;
  const t = e.changedTouches[0];
  endDrag(t.clientX, t.clientY);
}

function endDrag(x, y) {
  if (!dragActive) return;
  const wasDrag = Math.abs(x - dragStartX) > 5 || Math.abs(y - dragStartY) > 5;
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }
  dragActive = false;
  const prevOrigin = dragOriginSq;
  dragOriginSq = null;

  if (wasDrag) {
    const target = sqFromPoint(x, y);
    if (target !== null && target !== prevOrigin) {
      // selectedSq is still set from mousedown
      if (tryMove(target)) return;
    }
    // Invalid drop — keep selection for click-to-move
    render();
  }
  // If not a drag (just a click), selection was handled in mousedown
}

function sqFromPoint(x, y) {
  const els = document.elementsFromPoint(x, y);
  for (const el of els) {
    if (el.dataset.sq !== undefined) return parseInt(el.dataset.sq);
  }
  return null;
}

document.addEventListener('mousemove', onDocMouseMove);
document.addEventListener('mouseup', onDocMouseUp);
document.addEventListener('touchmove', onDocTouchMove, {passive:false});
document.addEventListener('touchend', onDocTouchEnd);

/* ===== Promotion ===== */
function showPromotion() {
  const ol = document.getElementById('promo-overlay');
  ol.classList.remove('hidden');
  const promos = [{s:'q',u:'\u2655'},{s:'r',u:'\u2656'},{s:'b',u:'\u2657'},{s:'n',u:'\u2658'}];
  ol.innerHTML =
    '<div class="promo-dialog">' +
    '<div class="promo-title">Promote to</div>' +
    '<div class="promo-pieces">' +
    promos.map(p =>
      '<button class="promo-btn" data-p="'+p.s+'"><span class="pc w">'+p.u+VS+'</span></button>'
    ).join('') +
    '</div></div>';
  ol.querySelectorAll('.promo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      ol.classList.add('hidden');
      const uci = pendingPromo.moves.find(m => m.endsWith(btn.dataset.p));
      pendingPromo = null;
      if (uci) sendMove(uci);
    });
  });
}

/* ===== Move Animation ===== */
function animatePiece(fromSq, toSq) {
  const sz = sqSize();
  const fromR = flipped ? sqRank(fromSq) : (7 - sqRank(fromSq));
  const fromC = flipped ? (7 - sqFile(fromSq)) : sqFile(fromSq);
  const toR = flipped ? sqRank(toSq) : (7 - sqRank(toSq));
  const toC = flipped ? (7 - sqFile(toSq)) : sqFile(toSq);
  const dx = (fromC - toC) * sz;
  const dy = (fromR - toR) * sz;
  const el = document.querySelector('[data-sq="'+toSq+'"] .pc');
  if (el) {
    el.animate([
      { transform: 'translate('+dx+'px,'+dy+'px)' },
      { transform: 'translate(0,0)' }
    ], { duration: 180, easing: 'ease-out' });
  }
}

/* ===== Send Move ===== */
async function sendMove(uci) {
  thinking = true;
  const depth = parseInt(document.getElementById('depth-select').value);
  document.getElementById('think-text').textContent = 'Engine thinking (depth ' + depth + ')...';
  document.getElementById('thinking').classList.remove('hidden');
  document.getElementById('btn-undo').disabled = true;
  // Don't re-render full board here to avoid flicker — just show overlay

  try {
    const data = await apiPost('/api/move', { uci, depth });
    if (data.error) {
      toast(data.error, 'error');
      playSound('illegal');
    } else {
      state = data.state;
      moveHistory = data.move_history;
      render();

      // Determine sound
      const isCheck = state.in_check || state.status === 'checkmate';
      const isGameOver = state.status === 'checkmate' || state.status === 'stalemate';
      if (isGameOver) playSound('gameover');
      else if (isCheck) playSound('check');
      else if (data.engine_capture || data.human_capture) playSound('capture');
      else playSound('move');

      // Animate engine move
      if (data.engine_move) {
        const ef = nameToSq(data.engine_move.slice(0,2));
        const et = nameToSq(data.engine_move.slice(2,4));
        animatePiece(ef, et);
      }

      // Show engine time
      if (data.engine_time) {
        document.getElementById('status-detail').textContent += ' \u00B7 ' + data.engine_time.toFixed(2) + 's';
      }
    }
  } catch(e) {
    toast('Network error', 'error');
  }

  thinking = false;
  document.getElementById('thinking').classList.add('hidden');
  document.getElementById('btn-undo').disabled = !moveHistory.length;
}

/* ===== Actions ===== */
async function newGame() {
  selectedSq = null;
  pendingPromo = null;
  const data = await apiGet('/api/new');
  state = data.state;
  moveHistory = data.move_history;
  render();
  toast('New game started', 'info');
}

async function undoMove() {
  if (!moveHistory.length || thinking) return;
  try {
    const data = await apiGet('/api/undo');
    if (data.error) { toast(data.error, 'error'); return; }
    state = data.state;
    moveHistory = data.move_history;
    selectedSq = null;
    render();
  } catch(e) { toast('Undo failed', 'error'); }
}

function flipBoard() {
  flipped = !flipped;
  document.getElementById('btn-flip').classList.toggle('active', flipped);
  render();
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('btn-sound').classList.toggle('active', soundOn);
  document.getElementById('sound-label').textContent = soundOn ? 'Sound' : 'Muted';
}

/* ===== FEN Copy ===== */
document.getElementById('fen-text').addEventListener('click', () => {
  if (!state) return;
  navigator.clipboard.writeText(state.fen).then(() => {
    const el = document.getElementById('fen-text');
    el.classList.add('fen-copied');
    toast('FEN copied', 'info');
    setTimeout(() => el.classList.remove('fen-copied'), 1000);
  });
});

/* ===== Toolbar Events ===== */
document.getElementById('btn-new').addEventListener('click', newGame);
document.getElementById('btn-undo').addEventListener('click', undoMove);
document.getElementById('btn-flip').addEventListener('click', flipBoard);
document.getElementById('btn-sound').addEventListener('click', toggleSound);

/* ===== Keyboard Shortcuts ===== */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  const k = e.key.toLowerCase();
  if (k === 'n' && !e.ctrlKey && !e.metaKey) newGame();
  else if (k === 'u') undoMove();
  else if (k === 'f') flipBoard();
  else if (k === 's' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleSound(); }
  else if (k === 'escape') { selectedSq = null; render(); }
});

/* ===== Init ===== */
async function init() {
  const data = await apiGet('/api/state');
  state = data.state;
  moveHistory = data.move_history;
  render();
}
init();
</script>
</body>
